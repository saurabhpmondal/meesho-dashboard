<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Meesho Sales & Ads Dashboard
    </title>

    <link
        rel="stylesheet"
        href="./css/reset.css"
    >

    <link
        rel="stylesheet"
        href="./css/variables.css"
    >

    <link
        rel="stylesheet"
        href="./css/layout.css"
    >

    <link
        rel="stylesheet"
        href="./css/dashboard.css"
    >

    <link
        rel="stylesheet"
        href="./css/responsive.css"
    >

</head>

<body>

    <div
        id="loadingOverlay"
        class="loading-overlay"
    >

        <div class="loading-card">

            <div class="loader"></div>

            <h3>
                Loading Dashboard
            </h3>

            <p>
                Fetching Sales & Ads Data
            </p>

        </div>

    </div>

    <div class="app-container">

        <header class="app-header">

            <div class="header-left">

                <div class="logo-wrapper">

                    <img
                        src="./assets/images.png"
                        alt="Logo"
                        class="app-logo"
                    >

                </div>

                <div>

                    <div class="app-title">

                        Meesho Sales & Ads Dashboard

                    </div>

                    <div class="app-subtitle">

                        Sales Analytics • Ads Analytics • Planning

                    </div>

                </div>

            </div>

            <div class="header-right">

                <div class="refresh-info">

                    <div class="refresh-label">

                        Last Refresh

                    </div>

                    <div id="lastRefresh">

                        -

                    </div>

                </div>

            </div>

        </header>

        <section class="filter-section">

            <div class="filter-grid">

                <div class="filter-item">

                    <label>

                        Month

                    </label>

                    <select
                        id="monthFilter"
                    >

                    </select>

                </div>

                <div class="filter-item">

                    <label>

                        Year

                    </label>

                    <select
                        id="yearFilter"
                    >

                    </select>

                </div>

                <div class="filter-item">

                    <label>

                        From Date

                    </label>

                    <input
                        type="date"
                        id="fromDate"
                    >

                </div>

                <div class="filter-item">

                    <label>

                        To Date

                    </label>

                    <input
                        type="date"
                        id="toDate"
                    >

                </div>

                <div
                    class="filter-item search-box"
                >

                    <label>

                        Search

                    </label>

                    <input
                        type="text"
                        id="globalSearch"
                        placeholder="Search Sub Order, Catalog, SKU, State, Packet ID..."
                    >

                </div>

            </div>

        </section>

        <section class="kpi-section">

            <div
                id="kpiCards"
                class="kpi-grid"
            >

            </div>

        </section>

        <main class="dashboard-content">

            <!-- DAILY SALES -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Daily Sales Performance

                    </h2>

                </div>

                <div
                    id="dailySalesContainer"
                    class="table-container"
                >

                </div>

            </section>

            <!-- MONTH WISE PERFORMANCE -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Month Wise Performance

                    </h2>

                </div>

                <div
                    id="monthlyPerformanceContainer"
                    class="table-container"
                >

                </div>

            </section>

            <!-- TOP STATES -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Top 10 States

                    </h2>

                </div>

                <div
                    id="topStatesContainer"
                    class="table-container"
                >

                </div>

            </section>

            <!-- MONTHLY ADS PERFORMANCE -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Monthly Ads Performance

                    </h2>

                </div>

                <div
                    id="monthlyAdsPerformanceContainer"
                    class="table-container"
                >

                </div>

            </section>

        </main>

    </div>

    <script
        type="module"
        src="./js/core/app.js"
    ></script>

</body>

</html>
