<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meesho Sales & Ads Dashboard</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/responsive.css">

</head>

<body>

    <!-- Loading Overlay -->

    <div id="loadingOverlay" class="loading-overlay">

        <div class="loading-card">

            <div class="loader"></div>

            <h3>Loading Dashboard</h3>

            <p>Please wait...</p>

        </div>

    </div>

    <!-- App -->

    <div id="app" class="app-container">

        <!-- Header -->

        <header class="app-header">

            <div class="header-left">

                <div class="logo-wrapper">

                    <img
                        src="./assets/logo.png"
                        alt="Logo"
                        class="app-logo"
                    >

                </div>

                <div>

                    <h1 class="app-title">

                        Meesho Sales & Ads Dashboard

                    </h1>

                    <p class="app-subtitle">

                        Sales Performance Analytics

                    </p>

                </div>

            </div>

            <div class="header-right">

                <div class="refresh-info">

                    <span class="refresh-label">

                        Last Refresh

                    </span>

                    <span id="lastRefresh">

                        --
                    </span>

                </div>

            </div>

        </header>

        <!-- Filters -->

        <section class="filter-section">

            <div class="filter-grid">

                <!-- Month -->

                <div class="filter-item">

                    <label>

                        Month

                    </label>

                    <select id="monthFilter">

                        <option value="all">

                            All Months

                        </option>

                    </select>

                </div>

                <!-- Year -->

                <div class="filter-item">

                    <label>

                        Year

                    </label>

                    <select id="yearFilter">

                        <option value="all">

                            All Years

                        </option>

                    </select>

                </div>

                <!-- From Date -->

                <div class="filter-item">

                    <label>

                        From Date

                    </label>

                    <input
                        type="date"
                        id="fromDate"
                    >

                </div>

                <!-- To Date -->

                <div class="filter-item">

                    <label>

                        To Date

                    </label>

                    <input
                        type="date"
                        id="toDate"
                    >

                </div>

                <!-- Search -->

                <div class="filter-item search-box">

                    <label>

                        Search

                    </label>

                    <input
                        type="text"
                        id="globalSearch"
                        placeholder="Order, Catalog, SKU, State, Packet..."
                    >

                </div>

            </div>

        </section>

        <!-- KPI Cards -->

        <section class="kpi-section">

            <div id="kpiCards" class="kpi-grid">

                <!-- Generated by JS -->

            </div>

        </section>

        <!-- Reports -->

        <main class="dashboard-content">

            <!-- Daily Sales -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Daily Sales

                    </h2>

                </div>

                <div
                    id="dailySalesContainer"
                    class="table-container"
                >

                </div>

            </section>

            <!-- Monthly Performance -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Monthly Performance

                    </h2>

                </div>

                <div
                    id="monthlyPerformanceContainer"
                    class="table-container"
                >

                </div>

            </section>

            <!-- Top States -->

            <section class="report-card">

                <div class="report-header">

                    <h2>

                        Top 10 States

                    </h2>

                </div>

                <div
                    id="topStatesContainer"
                    class="table-container"
                >

                </div>

            </section>

        </main>

    </div>

    <!-- Application -->

    <script type="module" src="./js/core/app.js"></script>

</body>

</html>
